name: Build and Release Electron App (electron-builder)

concurrency:
    group: electron-${{ github.ref }}
    cancel-in-progress: true

on:
    push:
        branches:
            - '**'

    pull_request:
        branches:
            - '**'

    workflow_dispatch:
        inputs:
            create_release:
                description: 'Create GitHub Release'
                required: false
                default: 'false'
                type: choice
                options:
                    - 'true'
                    - 'false'

            release_tag:
                description: 'Custom release tag (optional)'
                required: false
                default: ''

            prerelease:
                description: 'Mark as prerelease'
                required: false
                default: 'false'
                type: choice
                options:
                    - 'true'
                    - 'false'

jobs:
    compile:
        name: Compile (Typecheck + Vite Build)
        runs-on: ubuntu-latest

        steps:
            - name: Checkout Repository
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm

            - name: Install Dependencies
              run: npm install

            - name: Typecheck and Build
              run: npm run build

            - name: Upload Compiled Output
              uses: actions/upload-artifact@v4
              with:
                  name: compiled-output
                  path: out/
                  retention-days: 1

    package:
        name: Package (${{ matrix.os }}-${{ matrix.arch }})
        needs: compile
        runs-on: ${{ matrix.os }}

        strategy:
            fail-fast: false

            matrix:
                include:
                    - os: ubuntu-latest
                      arch: x64

                    - os: ubuntu-24.04-arm
                      arch: arm64

                    - os: windows-latest
                      arch: x64

                    - os: windows-11-arm
                      arch: arm64

        steps:
            - name: Checkout Repository
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm

            - name: Install Dependencies
              run: npm install

            - name: Download Compiled Output
              uses: actions/download-artifact@v4
              with:
                  name: compiled-output
                  path: out/

            - name: Cache Flatpak SDKs
              if: runner.os == 'Linux' && matrix.arch == 'x64'
              uses: actions/cache@v4
              with:
                  path: ~/.local/share/flatpak
                  key: flatpak-sdk-23.08-electron2-${{ runner.os }}

            - name: Install Flatpak build tools
              id: flatpak
              if: runner.os == 'Linux' && matrix.arch == 'x64'
              continue-on-error: true
              run: |
                  sudo apt-get update
                  sudo apt-get install -y flatpak flatpak-builder

                  flatpak remote-add --user --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo

                  flatpak install --user -y flathub org.freedesktop.Platform//23.08 org.freedesktop.Sdk//23.08

                  flatpak install --user -y flathub org.electronjs.Electron2.BaseApp//23.08

            - name: Package for Windows
              if: runner.os == 'Windows'
              run: |
                  npx electron-builder --win --${{ matrix.arch }} --publish never

            - name: Package for Linux
              if: runner.os == 'Linux'
              run: |
                  if [ "${{ matrix.arch }}" == "arm64" ]; then
                    npx electron-builder --linux AppImage deb --${{ matrix.arch }} --publish never
                  elif [ "${{ steps.flatpak.outcome }}" == "success" ]; then
                    npx electron-builder --linux --${{ matrix.arch }} --publish never
                  else
                    npx electron-builder --linux AppImage deb snap --${{ matrix.arch }} --publish never
                  fi

            - name: Upload Artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: ${{ matrix.os }}-${{ matrix.arch }}
                  path: |
                      dist/*.exe
                      dist/*.deb
                      dist/*.AppImage
                      dist/*.snap
                      dist/*.tar.gz
                      dist/*.blockmap
                      dist/latest*.yml
                  if-no-files-found: warn

    release:
        name: Create GitHub Release
        needs: package

        if: >-
            !cancelled() &&
            needs.package.result != 'failure' &&
            (
                github.ref == 'refs/heads/release' ||
                (
                    github.event_name == 'workflow_dispatch' &&
                    github.event.inputs.create_release == 'true'
                )
            )

        runs-on: ubuntu-latest

        permissions:
            contents: write

        steps:
            - name: Checkout Repository
              uses: actions/checkout@v4
              with:
                  sparse-checkout: |
                      package.json
                      CHANGELOG.md
                  sparse-checkout-cone-mode: false

            - name: Get version
              id: version
              run: |
                  VERSION=$(node -p "require('./package.json').version")
                  echo "version=$VERSION" >> $GITHUB_OUTPUT

            - name: Write release notes
              run: |
                  VERSION="${{ steps.version.outputs.version }}"
                  NOTES=$(awk "/^## \[$VERSION\]/{found=1; next} /^## \[/{if(found) exit} found{print}" CHANGELOG.md)

                  if [ -z "$NOTES" ]; then
                    NOTES="Release v$VERSION"
                  fi

                  echo "$NOTES" > /tmp/release_notes.md

            - name: Download Artifacts
              uses: actions/download-artifact@v4
              with:
                  pattern: '*-*'
                  merge-multiple: false

            - name: Install js-yaml
              run: npm install js-yaml

            - name: Create Release
              uses: softprops/action-gh-release@v2
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              with:
                  tag_name: ${{ github.event.inputs.release_tag || format('v{0}', steps.version.outputs.version) }}
                  name: ${{ github.event.inputs.release_tag || format('v{0}', steps.version.outputs.version) }}
                  body_path: /tmp/release_notes.md
                  prerelease: ${{ github.event.inputs.prerelease == 'true' }}
                  draft: false
                  files: |
                      windows-*-*/*.exe
                      windows-*-*/*.blockmap
                      ubuntu-*-*/*.deb
                      ubuntu-*-*/*.AppImage
                      ubuntu-*-*/*.snap
                      ubuntu-*-*/*.tar.gz
                      ubuntu-*-*/latest*.yml